name: Build and Deploy Pages

on:
  workflow_dispatch:
  schedule:
    - cron: '5 16 * * *'
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: [self-hosted, macOS]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Generate static data
        run: npm run build:static
        env:
          CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}
          CNKI_COOKIE: ${{ secrets.CNKI_COOKIE }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit generated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/site-data.json public/data/archive-data.json public/data/translation-cache.json public/data/history/*.json public/.nojekyll
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): update latest + archive snapshots"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
